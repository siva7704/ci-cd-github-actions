name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
  workflow_dispatch:

jobs:

  build:
    name: Build Stage
    runs-on: ubuntu-latest

    steps:
      # Checkout the latest code from repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Install project dependencies (if available)
      - name: Install dependencies
        run: npm install || echo "Skipping install - no package.json"

      # Build the project (if build script exists)
      - name: Build project
        run: npm run build || echo "No build script found"

      # Create a simple build output file (
      - name: Generate build output
        run: echo "Build completed successfully" > build-output.txt

      # Upload the build file as artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: build-output.txt


  test:
    name: Test Stage
    runs-on: ubuntu-latest
    needs: build

    steps:
      
      - name: Run tests
        run: npm test || echo "No tests configured"


  deploy:
    name: Deploy Stage
    runs-on: ubuntu-latest
    needs: [build, test]

    steps:
      
      - name: Deploy application
        run: echo "Application deployed successfully"
